# Local profile — credentials/project come from the environment (.env), so no
# secrets live in this file. Run dbt with `--profiles-dir dbt` (see Makefile).
crypto_microstructure:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('BQ_MARTS_DATASET', 'crypto_marts') }}"
      location: "{{ env_var('BQ_LOCATION', 'US') }}"
      threads: 4
      priority: interactive
      job_execution_timeout_seconds: 300
      job_retries: 1
